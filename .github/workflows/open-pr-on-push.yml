name: Open PR on Branch Push

on:
  push:
    branches-ignore:
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        run: |
          if ! gh pr view --repo ${{ github.repository }} 2>/dev/null; then
            gh pr create \
              --title "PR: ${{ github.ref_name }}" \
              --body "Auto-created PR from branch \`${{ github.ref_name }}\`" \
              --head ${{ github.ref_name }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
